# ============================================================
# NotKillRank - Cấu hình chính
# Các cài đặt chi tiết của từng module nằm trong modules/
# ============================================================

# ────────────────────────────────────────────────
# CẤU HÌNH LƯU TRỮ DỮ LIỆU
# ────────────────────────────────────────────────
storage:
  # Loại lưu trữ: YAML, SQLITE, H2
  type: H2
  sqlite:
    file: playerdata
  h2:
    file: playerdata

# ────────────────────────────────────────────────
# BẬT / TẮT MODULE
# true = bật  |  false = tắt
# Sau khi thay đổi, dùng /nkr reload để áp dụng
# ────────────────────────────────────────────────
modules:
  enabled:
    # Chống farm elo (giới hạn số lần giết cùng người / giờ)
    anti-farm: true

    # Hệ thống truy nã (bounty)
    bounty: true

    # Suy giảm elo khi offline lâu
    decay: true

    # Bảo vệ người mới (newbie protection)
    protection: true

    # Kill streak, death streak, [Kẻ yếu], [Kẻ sống sót], milestone
    streaks: true

    # Tag [Vô song] cho người giữ top 1 liên tiếp
    vosong: true

    # PlaceholderAPI expansion (tắt nếu không dùng PAPI)
    placeholderapi: true