# NotKillRank - Cấu hình chính
# Cài đặt chi tiết từng module nằm trong thư mục modules/

# Loại lưu trữ dữ liệu người chơi
# Hỗ trợ: YAML, SQLITE, H2
# Khuyên dùng: H2 (nhanh, không cần cài thêm)
storage:
  type: H2
  sqlite:
    # Tên file SQLite — không cần đuôi .db
    file: playerdata
  h2:
    # Tên file H2 — không cần đuôi .mv.db
    file: playerdata

# Bật/tắt từng module — true = bật, false = tắt
# Áp dụng sau khi dùng /nkr reload
modules:
  enabled:
    # Chống farm elo (giới hạn số lần giết cùng người trong 1 giờ)
    anti-farm: true
    # Hệ thống truy nã
    bounty: false
    # Suy giảm elo khi offline lâu
    decay: true
    # Bảo vệ người mới
    protection: false
    # Báo thù — bonus elo khi giết lại người vừa giết mình (cấu hình trong modules/revenger.yml)
    revenger: false
    # Kill streak, death streak, cột mốc chuỗi giết
    streaks: false
    # Gửi thông tin /stats lên Discord qua webhook (cấu hình chi tiết trong modules/webhook.yml)
    webhook: false
    # Tích hợp PvPManager — phạt ELO khi combat log (thoát game lúc đang combat)
    # Yêu cầu cài PvPManager trên server, bỏ qua nếu không tìm thấy
    pvpmanager: true
    # Tích hợp PlaceholderAPI — tắt nếu server không cài PAPI
    # Dùng trong scoreboard, tab, chat formatter và bất kỳ plugin hỗ trợ PAPI:
    #   %notkillrank_elo%            — elo hiện tại
    #   %notkillrank_rank%           — tag hạng (MiniMessage)
    #   %notkillrank_rank_with_tag%  — tag hạng + tag chuỗi ([Kẻ yếu] / [Kẻ sống sót] / ...)
    #   %notkillrank_next_rank%      — rank tiếp theo sẽ mở khóa
    #   %notkillrank_next_needed%    — số elo cần để mở khóa rank kế tiếp
    #   %notkillrank_streak_tag%     — chỉ tag chuỗi hiện tại
    #   %notkillrank_kills%          — tổng số kill
    #   %notkillrank_deaths%         — tổng số lần chết
    #   %notkillrank_kd%             — tỷ lệ K/D (2 chữ số thập phân)
    #   %notkillrank_kill_streak%    — chuỗi kill đang có
    #   %notkillrank_death_streak%   — chuỗi chết đang có
    #   %notkillrank_highest_streak% — chuỗi kill cao nhất từ trước đến nay
    #   %notkillrank_peak_elo%       — elo đỉnh cao nhất đạt được
    #   %notkillrank_is_weak%        — true nếu đang mang trạng thái [Kẻ yếu]
    #   %notkillrank_bounty%         — tổng elo bounty trên đầu người chơi
    placeholderapi: true

# Tự động lưu dữ liệu người chơi định kỳ
auto-save:
  enabled: true
  # Chu kỳ lưu tính bằng giây — 300 = 5 phút
  interval-seconds: 300
