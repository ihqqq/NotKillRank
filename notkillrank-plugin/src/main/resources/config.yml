# ============================================================
# NotKillRank - Cấu hình chính
# Các cài đặt module được tách riêng vào thư mục modules/
# ============================================================

# ────────────────────────────────────────────────
# CẤU HÌNH LƯU TRỮ DỮ LIỆU
# ────────────────────────────────────────────────
storage:
  # Loại lưu trữ: YAML, SQLITE, H2
  # YAML  — lưu mỗi người chơi vào 1 file .yml riêng (mặc định)
  # SQLITE — lưu vào 1 file SQLite (.db) trong thư mục plugin
  # H2     — lưu vào H2 embedded database trong thư mục plugin
  type: H2

  sqlite:
    # Tên file SQLite (không cần đuôi .db)
    file: playerdata

  h2:
    # Tên file H2 (không cần đuôi)
    file: playerdata
