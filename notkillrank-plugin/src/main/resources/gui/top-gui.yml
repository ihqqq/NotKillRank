# NotKillRank - GUI Bảng Xếp Hạng Top 10
# Dùng MiniMessage: https://docs.advntr.dev/minimessage/format.html
#
# Cấu hình icon:
#   - Vật phẩm thông thường: type: GRAY_STAINED_GLASS_PANE
#   - Đầu custom (texture base64):
#       type: CUSTOM_HEAD
#       texture: "eyJ0ZXh0dXJlcy..."
#     Lấy giá trị base64 tại https://minecraft-heads.com → tab "Other" → copy "Value"

# Tên cửa sổ GUI
name: <white><sprite:"minecraft:items":item/copper_sword> <dark_gray>ᴛᴏᴘ ᴇʟᴏ

# Số hàng của GUI — tối đa 6
rows: 6

# Nền của GUI — được fill trước, các slot khác đặt lên trên
background:
  icon:
    type: GRAY_STAINED_GLASS_PANE
  # Nếu muốn dùng custom head, uncomment và điền texture:
  #type: CUSTOM_HEAD
  #texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNTNlYjYzNDNhOGVmNWFlZTdmZjA2YmM2Nzg1MmE2ZTZjYjJiN2UxYzI4MDIwYjkzZTdkMjdjMDRiZjBjYjU3MyJ9fX0="
  # Mỗi hàng phải đúng 9 ký tự — 'x' = có nền, ' ' = bỏ trống
  fill:
    - xxxxxxxxx
    - x       x
    - x       x
    - x       x
    - x       x
    - " xxxxxxx "

# Vị trí slot hiển thị đầu từng người trong top (index từ 0, theo thứ tự top 1 → top 10)
player-slots:
  - 13
  - 21
  - 23
  - 29
  - 33
  - 38
  - 39
  - 40
  - 41
  - 42

# Thông tin hiển thị trên đầu mỗi người trong bảng xếp hạng
# Placeholder: {medal}, {player}, {rank}, {elo}, {kills}, {deaths}, {kd}, {highest_streak}, {peak_elo}, {bounty}
player-head:
  name: '{medal} <white>{player}'
  lore:
    - ''
    - ' <white><sprite:"minecraft:items":item/totem_of_undying> <gray>Hạng: {rank}'
    - ' <white><sprite:"minecraft:items":item/amethyst_shard> <gray>Elo: <green>{elo}'
    - ' <white><sprite:"minecraft:items":item/diamond_sword> <gray>Kill/Death: <yellow>{kills}<gray>/<red>{deaths}'
    - ' <white><sprite:"minecraft:items":item/creeper_banner_pattern> <gray>Kill streak
    cao nhất: <red>{highest_streak}'
    - ' <white><sprite:"minecraft:items":item/lime_candle> <gray>Peak elo: <gold>{peak_elo}'
    - ''
  # Dòng lore thêm vào khi người chơi có bounty — Placeholder: {bounty}
  bounty-lore:
    - ''
    - '<gold>Bounty: <red>{bounty} elo'

# Huy hiệu theo vị trí xếp hạng — Placeholder trong medals: {pos}
medals:
  '1': <dark_gray>[<gold>#1<dark_gray>]
  '2': <dark_gray>[<blue>#2<dark_gray>]
  '3': <dark_gray>[<red>#3<dark_gray>]
  default: <dark_gray>[<gray>#{pos}<dark_gray>]

# Các nút trong GUI
# slot: vị trí ô (0-53 với 6 hàng)
# click-commands: danh sách lệnh chạy sau khi đóng GUI
#   Prefix xác định ai chạy lệnh (mặc định [player] nếu không có prefix):
#     [player]     → chạy như người chơi bình thường
#     [console]    → chạy bằng console (có toàn quyền)
#     [playerasop] → chạy như người chơi nhưng tạm thời có OP
#   Không cần dấu / trước lệnh
#   Ví dụ:
#     click-commands: []                          # chỉ đóng GUI
#     click-commands: ['[player] menu']           # mở /menu
#     click-commands: ['[console] dm open main']  # console chạy lệnh
#     click-commands: ['[playerasop] test']       # chạy /test với quyền OP tạm thời
#     click-commands: ['[player] spawn', '[console] say {player} về spawn'] # nhiều lệnh
buttons:
  back:
    slot: 45
    icon:
      type: CUSTOM_HEAD
      texture: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNDliMmJlZTM5YjZlZjQ3ZTE4MmQ2ZjFkY2E5ZGVhODQyZmNkNjhiZGE5YmFjYzZhNmQ2NmE4ZGNkZjNlYyJ9fX0=
      name: '<red>Click để quay lại'
    click-commands:
      - '[player] menu'
  close:
    slot: 53
    type: CUSTOM_HEAD
    texture: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYmViNTg4YjIxYTZmOThhZDFmZjRlMDg1YzU1MmRjYjA1MGVmYzljYWI0MjdmNDYwNDhmMThmYzgwMzQ3NWY3In19fQ==
    icon:
      type: BARRIER
      name: '<red>Click để đóng'
    click-commands: []
