# ============================================================
# NotKillRank - Cấu hình GUI Bảng Xếp Hạng Top 10
# Hỗ trợ MiniMessage (https://docs.advntr.dev/minimessage/format.html)
# ============================================================
#
# ── HƯỚNG DẪN CẤU HÌNH ICON ──────────────────────────────
#
# Loại icon thông thường (bất kỳ tên Material hợp lệ):
#   icon:
#     type: GRAY_STAINED_GLASS_PANE
#
# Đầu tùy chỉnh bằng texture base64 (CUSTOM_HEAD hoặc PLAYER_HEAD + texture):
#   icon:
#     type: CUSTOM_HEAD
#     texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvIn19fQ=="
#
#   Lấy chuỗi base64 tại: https://minecraft-heads.com
#   (Vào trang head, chọn tab "Other", copy giá trị "Value")
#
# ─────────────────────────────────────────────────────────

# Tên giao diện
name: <white><sprite:"minecraft:items":item/copper_sword> <dark_gray>ᴛᴏᴘ ᴇʟᴏ

# Số hàng của giao diện (tối đa 6)
rows: 6

# Tô nền cho Menu
# Nền sẽ được fill trước tiên, các button khác sẽ được đặt lên nền
background:
  icon:
    type: GRAY_STAINED_GLASS_PANE
  # Uncomment để dùng custom head texture thay cho glass pane:
  #type: CUSTOM_HEAD
  #texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNTNlYjYzNDNhOGVmNWFlZTdmZjA2YmM2Nzg1MmE2ZTZjYjJiN2UxYzI4MDIwYjkzZTdkMjdjMDRiZjBjYjU3MyJ9fX0="
  # Mỗi hàng phải có đúng 9 ký tự — 'x' = fill ô đó, ' ' (khoảng trắng) = bỏ trống
  fill:
    - xxxxxxxxx
    - x       x
    - x       x
    - x       x
    - x       x
    - xxxxxxxxx

# Vị trí slot cho top 1 → top 10 (theo thứ tự hạng, index từ 0)
player-slots:
  - 13
  - 21
  - 23
  - 29
  - 33
  - 38
  - 39
  - 40
  - 41
  - 42

# Hiển thị đầu người chơi trong bảng xếp hạng
# Placeholder: {medal}, {player}, {rank}, {elo}, {kills}, {deaths}, {kd}, {highest_streak}, {peak_elo}, {bounty}
player-head:
  name: '{medal} <white>{player}'
  lore:
    - ''
    - ' <white><sprite:"minecraft:items":item/totem_of_undying> <gray>Hạng: {rank}'
    - ' <white><sprite:"minecraft:items":item/amethyst_shard> <gray>Elo: <green>{elo}'
    - ' <white><sprite:"minecraft:items":item/diamond_sword> <gray>Kill/Death: <yellow>{kills}<gray>/<red>{deaths}'
    - ' <white><sprite:"minecraft:items":item/creeper_banner_pattern> <gray>Kill streak
    cao nhất: <red>{highest_streak}'
    - ' <white><sprite:"minecraft:items":item/lime_candle> <gray>Peak elo: <gold>{peak_elo}'
    - ''
  # Dòng lore bổ sung hiển thị khi người chơi có bounty
  bounty-lore:
    - ''
    - '<gold>Bounty: <red>{bounty} elo'

# Huy hiệu cho từng vị trí xếp hạng (MiniMessage)
medals:
  '1': <dark_gray>[<gold>#1<dark_gray>]
  '2': <dark_gray>[<blue>#2<dark_gray>]
  '3': <dark_gray>[<red>#3<dark_gray>]
  default: <dark_gray>[<gray>#{pos}<dark_gray>]
