# NotKillRank - Module: Suy Giảm Elo (Elo Decay)

# Số ngày offline liên tiếp trước khi bắt đầu mất elo
offline-days: 7

# Phần trăm elo mất mỗi ngày sau khi vượt offline-days
# Ví dụ: 1 → mất 1% elo mỗi ngày offline thêm
daily-percent: 1

# Giới hạn tổng phần trăm elo có thể mất do suy giảm
# Ví dụ: 10 → dù offline bao lâu cũng chỉ mất tối đa 10% elo
max-percent: 10
