# NotKillRank - Module: Hệ thống ELO

# Elo khởi đầu khi người chơi lần đầu vào server
start-elo: 500

# Elo tối thiểu — người chơi không thể rớt xuống dưới mức này
min-elo: 100

# Phần trăm elo của nạn nhân mà người giết nhận được
# Ví dụ: 10 → giết người có 500 elo → nhận 50 elo
kill-percent: 5

# Hệ số nhân khi giết người có elo cao hơn mình
# Ví dụ: 1.5 → nhận thêm 50% elo so với bình thường
high-elo-multiplier: 1.5

# Ngưỡng xác định "elo thấp", tính theo % elo của bản thân
# Ví dụ: 50 → nếu elo nạn nhân < 50% elo của bạn thì áp hệ số thấp
low-elo-threshold: 50

# Hệ số nhân khi giết người có elo thấp hơn ngưỡng trên
# Ví dụ: 0.5 → chỉ nhận 50% elo so với bình thường
low-elo-multiplier: 0.5
  